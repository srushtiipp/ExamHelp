<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Note Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; height: 100vh; }
.sidebar { width: 260px; background: #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.logo { font-size: 22px; font-weight: 800; color: #818cf8; }
.status { font-size: 12px; padding: 6px 10px; border-radius: 6px; background: #0f172a; }
.upload-box { border: 2px dashed #334155; border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; }
.upload-box:hover { border-color: #818cf8; }
.upload-box input { display: none; }
.pdf-item { padding: 10px; border-radius: 8px; background: #0f172a; font-size: 12px; margin-bottom: 6px; }
.pdf-item.done { border-left: 3px solid #4ade80; color: #86efac; }
.pdf-item.loading { border-left: 3px solid #fbbf24; color: #fde68a; }
.main { flex: 1; display: flex; flex-direction: column; }
.topbar { padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155; font-weight: 700; font-size: 18px; }
.messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
.welcome { margin: auto; text-align: center; color: #475569; }
.welcome h2 { font-size: 26px; margin-bottom: 8px; color: #64748b; }
.msg { max-width: 78%; line-height: 1.65; padding: 14px 18px; border-radius: 16px; }
.msg.user { align-self: flex-end; background: #6366f1; border-radius: 18px 18px 4px 18px; }
.msg.bot { align-self: flex-start; background: #1e293b; border-radius: 18px 18px 18px 4px; border: 1px solid #334155; }
.sources { border-top: 1px solid #334155; padding-top: 10px; margin-top: 8px; font-size: 12px; color: #64748b; }
.chip { display: inline-block; background: #0f172a; border: 1px solid #334155; color: #818cf8; padding: 3px 10px; border-radius: 20px; font-size: 11px; margin: 2px; }
.conf-high { color: #4ade80; font-size: 11px; margin-top: 6px; }
.conf-low { color: #f87171; font-size: 11px; margin-top: 6px; }
.input-row { padding: 18px 24px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 10px; }
.input-row input { flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 10px; font-size: 15px; outline: none; }
.input-row input:focus { border-color: #6366f1; }
.ask-btn { background: #6366f1; color: white; border: none; padding: 12px 22px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; }
.ask-btn:disabled { background: #334155; cursor: not-allowed; }
.typing { color: #64748b; font-style: italic; font-size: 14px; padding: 10px 0; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">📚 NoteAI</div>
  <div class="status" id="statusBar">⏳ Checking...</div>
  <div class="upload-box" onclick="document.getElementById('fi').click()">
    <input type="file" id="fi" accept=".pdf" onchange="uploadPDF(this)">
    <div style="font-size:32px">📄</div>
    <div style="font-size:13px;color:#94a3b8;margin-top:6px">Click to upload PDF</div>
    <div style="font-size:11px;color:#475569;margin-top:3px">Handwritten notes supported</div>
  </div>
  <div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:1px">Uploaded PDFs</div>
  <div id="pdfList" style="flex:1;overflow-y:auto">
    <div style="color:#475569;font-size:12px">No PDFs yet</div>
  </div>
  <div onclick="window.open('http://localhost:8000/report')" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:center;">📥 Export Report</div>
</div>
<div class="main">
  <div class="topbar">💬 Ask Questions About Your Notes</div>
  <div class="messages" id="messages">
    <div class="welcome">
      <h2>👋 Ready!</h2>
      <p>Upload a handwritten PDF and ask questions.<br>I only answer from your notes.</p>
    </div>
  </div>
  <div class="input-row">
    <input type="text" id="qInput" placeholder="Ask anything about your notes..." onkeydown="if(event.key==='Enter')sendQ()">
    <button class="ask-btn" id="askBtn" onclick="sendQ()">Ask →</button>
  </div>
</div>
<script>
const API = "http://localhost:8000";
window.onload = async () => {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById("statusBar").innerHTML = `<span style="color:#4ade80">🟢 System Ready</span>`;
  } catch {
    document.getElementById("statusBar").innerHTML = `<span style="color:#f87171">🔴 Backend offline</span>`;
  }
};
async function uploadPDF(input) {
  const file = input.files[0];
  if (!file) return;
  const list = document.getElementById("pdfList");
  list.innerHTML = "";
  const item = document.createElement("div");
  item.className = "pdf-item loading";
  item.innerHTML = `⏳ ${file.name}<br><small>Processing...</small>`;
  list.appendChild(item);
  const fd = new FormData();
  fd.append("file", file);
  try {
    const r = await fetch(`${API}/upload`, { method: "POST", body: fd });
    const d = await r.json();
    item.className = "pdf-item done";
    item.innerHTML = `✅ ${file.name}<br><small>${d.pages} pages · ${d.chunks} chunks</small>`;
    addMsg("bot", `📄 <strong>${file.name}</strong> ready! ${d.pages} pages processed. Ask me anything!`, [], 100);
  } catch(e) {
    item.innerHTML = `❌ Upload failed`;
  }
  input.value = "";
}
async function sendQ() {
  const input = document.getElementById("qInput");
  const q = input.value.trim();
  if (!q) return;
  addMsg("user", q, [], null);
  input.value = "";
  document.getElementById("askBtn").disabled = true;
  const t = document.createElement("div");
  t.className = "typing"; t.id = "typing";
  t.textContent = "🔍 Searching notes...";
  document.getElementById("messages").appendChild(t);
  scrollBottom();
  try {
    const r = await fetch(`${API}/ask`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({question: q})
    });
    const d = await r.json();
    document.getElementById("typing")?.remove();
    const topScore = d.sources?.[0]?.confidence || 0;
    addMsg("bot", d.answer, d.sources, topScore);
  } catch {
    document.getElementById("typing")?.remove();
    addMsg("bot", "❌ Error reaching backend.", [], 0);
  }
  document.getElementById("askBtn").disabled = false;
}
function addMsg(role, text, sources, confidence) {
  document.querySelector(".welcome")?.remove();
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const isUnsure = text.toLowerCase().includes("don't have enough");
  let confHTML = "";
  if (role === "bot" && confidence !== null) {
    confHTML = isUnsure
      ? `<div class="conf-low">⚠️ Not found in notes</div>`
      : `<div class="conf-high">✅ Found in notes</div>`;
  }
  let srcHTML = "";
  if (sources?.length) {
    srcHTML = `<div class="sources">📍 Sources: ${sources.map(s => `<span class="chip">📄 ${s.source}</span>`).join('')}</div>`;
  }
  div.innerHTML = `<div>${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>${confHTML}${srcHTML}`;
  msgs.appendChild(div);
  scrollBottom();
}
function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}
</script>
</body>
</html>
